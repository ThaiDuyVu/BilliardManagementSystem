<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .box {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; margin-bottom: 1.5rem; color: var(--text-main); }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            margin: 8px 0;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box; /* Quan trọng: để tránh bị tràn lề */
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
        }

        button:hover { background: var(--primary-hover); }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .msg {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.875rem;
            min-height: 20px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Đăng ký tài khoản</h2>

    <input id="username" placeholder="Tên đăng nhập"/>
    <input id="fullName" placeholder="Họ và tên"/>
    <input id="email" type="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Mật khẩu"/>
    <input id="confirmPassword" type="password" placeholder="Xác nhận mật khẩu"/>

    <button onclick="register()">Đăng ký</button>

    <p class="login-link">
        Đã có tài khoản? <a href="/login">Đăng nhập ngay</a>
    </p>

    <div class="msg" id="msg"></div>
</div>

<script>
    async function register() {
        const msgEl = document.getElementById("msg");
        const username = document.getElementById("username").value;
        const fullName = document.getElementById("fullName").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if(!username || !fullName || !email || !password) {
            msgEl.innerText = "Vui lòng điền đầy đủ thông tin!";
            msgEl.style.color = "red";
            return;
        }

        if (password !== confirmPassword) {
            msgEl.innerText = "Mật khẩu xác nhận không khớp!";
            msgEl.style.color = "red";
            return;
        }

        try {
            const res = await fetch("/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, fullName, email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                msgEl.innerText = "Lỗi: " + (data.message || "Đăng ký thất bại");
                msgEl.style.color = "red";
                return;
            }

            msgEl.innerText = "Đăng ký thành công! Đang chuyển hướng...";
            msgEl.style.color = "green";

            setTimeout(() => { window.location.href = "/login"; }, 1500);

        } catch (err) {
            msgEl.innerText = "Lỗi kết nối máy chủ!";
            msgEl.style.color = "red";
        }
    }
</script>

</body>
</html>
