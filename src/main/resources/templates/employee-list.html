<!DOCTYPE html>
<html>
<head>
    <title>Employee Management</title>

    <style>
        .terminated {
            opacity: 0.6;
            background-color: #f8f8f8;
        }

        .status-terminated {
            color: red;
            font-weight: bold;
        }

        .container {
            margin-bottom: 20px;
        }

        select, input {
            margin: 5px;
        }

        table {
            border-collapse: collapse;
        }

        td, th {
            padding: 6px 10px;
        }
    </style>
</head>
<body>

<h2>Employee Management</h2>

<button onclick="load()">Reload</button>

<hr>

<!-- ================= UPDATE ================= -->
<div class="container">
    <h3>Update Employee</h3>

    <select id="updateId"></select>

    <input id="fullName" placeholder="Full Name">
    <input id="phone" placeholder="Phone">
    <input id="dob" type="date">
    <input id="salary" placeholder="Base Salary">

    <select id="employmentType">
        <option value="FULL_TIME">FULL_TIME</option>
        <option value="PART_TIME">PART_TIME</option>
        <option value="CONTRACT">CONTRACT</option>
        <option value="PROBATION">PROBATION</option>
    </select>

    <select id="status">
        <option value="ACTIVE">ACTIVE</option>
        <option value="ON_LEAVE">ON_LEAVE</option>
        <option value="TERMINATED">TERMINATED</option>
        <option value="SUSPENDED">SUSPENDED</option>
    </select>

    <input id="branchId" placeholder="Branch ID">

    <button onclick="updateEmployee()">Update</button>
</div>

<hr>

<!-- ================= DELETE + REACTIVATE ================= -->
<div class="container">
    <h3>Delete / Reactivate Employee</h3>

    <select id="deleteId"></select>

    <button onclick="deleteEmployee()">Delete</button>

    <button onclick="reactivateEmployee()" style="margin-left:10px; background-color:green; color:white;">
        Reactivate
    </button>
</div>

<hr>

<!-- ================= TABLE ================= -->
<h3>Employee List</h3>

<table border="1" width="100%">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Branch</th>
        <th>Status</th>
    </tr>
    </thead>

    <tbody id="table"></tbody>
</table>

<script>

    let employees = [];

    async function load() {

        const token = localStorage.getItem("token");

        const res = await fetch('/api/hr/employees', {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        });

        employees = await res.json();

        renderTable();
        renderDropdowns();
    }

    function renderTable() {

        let html = "";

        employees.forEach(e => {

            const isTerminated = e.status === "TERMINATED";

            html += `
            <tr class="${isTerminated ? 'terminated' : ''}">
                <td>${e.id}</td>
                <td>${e.fullName}</td>
                <td>${e.phone || ''}</td>
                <td>${e.branchName || ''}</td>
                <td class="${isTerminated ? 'status-terminated' : ''}">
                    ${e.status || ''}
                </td>
            </tr>
        `;
        });

        document.getElementById("table").innerHTML = html;
    }

    function renderDropdowns() {

        let options = "";

        employees.forEach(e => {
            options += `<option value="${e.id}">
                ${e.id} - ${e.fullName} (${e.status})
            </option>`;
        });

        document.getElementById("updateId").innerHTML = options;
        document.getElementById("deleteId").innerHTML = options;
    }

    async function updateEmployee() {

        const id = document.getElementById("updateId").value;

        const body = {
            fullName: document.getElementById("fullName").value,
            phone: document.getElementById("phone").value,
            dateOfBirth: document.getElementById("dob").value,
            baseSalary: document.getElementById("salary").value ? Number(document.getElementById("salary").value) : null,
            employmentType: document.getElementById("employmentType").value,
            status: document.getElementById("status").value,
            branchId: document.getElementById("branchId").value ? Number(document.getElementById("branchId").value) : null
        };

        const token = localStorage.getItem("token");

        const res = await fetch(`/api/hr/employees/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(body)
        });

        alert(await res.text());
        load();
    }

    async function deleteEmployee() {

        const id = document.getElementById("deleteId").value;

        if (!confirm("Delete employee?")) return;

        const token = localStorage.getItem("token");

        const res = await fetch(`/api/hr/employees/${id}`, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        alert(await res.text());
        load();
    }

    async function reactivateEmployee() {

        const id = document.getElementById("deleteId").value;

        const token = localStorage.getItem("token");

        const res = await fetch(`/api/hr/employees/${id}/reactivate`, {
            method: "PUT",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        alert(await res.text());
        load();
    }

    load();

</script>

</body>
</html>
