<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management</title>

    <style>
        /* --- THIẾT LẬP BIẾN MÀU THEO CHUẨN --- */
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --success-color: #10b981;
            --success-hover: #059669;
            --bg-body: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #d1d5db;
            --border-focus: #4f46e5;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
        }

        /* ========================= */
        /* 🔥 DASHBOARD TOPBAR START */
        /* 👉 COPY THIS BLOCK TO ALL PAGES */
        /* ========================= */
        .topbar {
            background:#1f2937;
            color:white;
            padding:12px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .topbar a {
            color:white;
            margin-right:10px;
            text-decoration:none;
        }

        .topbar a:hover {
            text-decoration: underline;
        }
        /* ========================= */
        /* 🔥 DASHBOARD TOPBAR END */
        /* ========================= */

        /* --- BỐ CỤC NỘI DUNG --- */
        .content {
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h2, h3 {
            margin: 0 0 16px 0;
            color: var(--text-main);
        }

        /* --- GIAO DIỆN CARD --- */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            margin-bottom: 24px;
        }

        /* --- LƯỚI FORM (GRID) --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input, select {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            background-color: #f9fafb;
        }

        input:focus, select:focus {
            border-color: var(--border-focus);
            background-color: #fff;
        }

        /* --- BUTTONS --- */
        button {
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            color: white;
            background-color: var(--primary-color);
        }

        button:hover { background-color: var(--primary-hover); }

        .btn-danger { background-color: var(--danger-color); }
        .btn-danger:hover { background-color: var(--danger-hover); }

        .btn-success { background-color: var(--success-color); }
        .btn-success:hover { background-color: var(--success-hover); }

        .button-group {
            display: flex;
            gap: 12px;
        }

        /* --- BẢNG DỮ LIỆU --- */
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            text-align: left;
            background: white;
        }

        th {
            background-color: #f9fafb;
            padding: 12px 16px;
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.875rem;
            text-transform: uppercase;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover { background-color: #f9fafb; }

        /* --- TRẠNG THÁI (STATUS BADGES) --- */
        .terminated {
            opacity: 0.6;
            background-color: #fef2f2 !important;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-active { background: #d1fae5; color: #065f46; }
        .badge-terminated { background: #fee2e2; color: #991b1b; }
        .badge-other { background: #f3f4f6; color: #374151; }

    </style>
</head>

<body>

<div class="topbar">
    <div class="logo"><b>ADMIN</b></div>
    <div class="menu">
        <a href="/employee-list">Employees</a>
        <a href="/employee-create">Add Employee</a>
        <a href="/shift-management">Shifts</a>
        <a href="/assign-shift">assign-Shifts</a>
        <a href="/inventory/dashboard">Inventory</a>
        <a href="/inventory/report">Report</a>
        <a href="/users-ui">Users</a>
    </div>
</div>  
<div class="content">

    <div class="header-action">
        <h2>Employee Management</h2>
        <button onclick="load()">🔄 Reload Data</button>
    </div>

    <div class="card">
        <h3>Update Employee</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Select Employee</label>
                <select id="updateId"></select>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input id="fullName" placeholder="VD: Nguyen Van A">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input id="phone" placeholder="VD: 0901234567">
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input id="dob" type="date">
            </div>
            <div class="form-group">
                <label>Base Salary</label>
                <input id="salary" type="number" placeholder="VD: 15000000">
            </div>
            <div class="form-group">
                <label>Employment Type</label>
                <select id="employmentType">
                    <option value="FULL_TIME">FULL_TIME</option>
                    <option value="PART_TIME">PART_TIME</option>
                    <option value="CONTRACT">CONTRACT</option>
                    <option value="PROBATION">PROBATION</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="status">
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="ON_LEAVE">ON_LEAVE</option>
                    <option value="TERMINATED">TERMINATED</option>
                    <option value="SUSPENDED">SUSPENDED</option>
                </select>
            </div>
            <div class="form-group">
                <label>Branch ID</label>
                <input id="branchId" type="number" placeholder="VD: 1">
            </div>
        </div>
        <button onclick="updateEmployee()">Lưu Cập Nhật</button>
    </div>

    <div class="card">
        <h3>Delete / Reactivate</h3>
        <div class="form-grid" style="grid-template-columns: 1fr;">
            <div class="form-group" style="max-width: 400px;">
                <label>Select Employee</label>
                <select id="deleteId"></select>
            </div>
        </div>
        <div class="button-group">
            <button class="btn-danger" onclick="deleteEmployee()">Delete Employee</button>
            <button class="btn-success" onclick="reactivateEmployee()">Reactivate</button>
        </div>
    </div>

    <div class="card">
        <h3>Employee List</h3>
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Branch</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody id="table"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    const token = localStorage.getItem("token");

    if (!token) {
        alert("Bạn chưa đăng nhập!");
        window.location.href = "/login";
    }
    let employees = [];

    async function load() {
        try {
            const res = await fetch('/api/hr/employees', {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (!res.ok) {
                alert("Load failed (unauthorized or expired token)");
                return;
            }

            employees = await res.json();
            renderTable();
            renderDropdowns();
        } catch (error) {
            console.error("Lỗi khi tải dữ liệu:", error);
        }
    }

    function renderTable() {
        document.getElementById("table").innerHTML =
            employees.map(e => {
                // Tạo class màu sắc cho Badge Status
                let badgeClass = 'badge-other';
                if(e.status === 'ACTIVE') badgeClass = 'badge-active';
                else if(e.status === 'TERMINATED') badgeClass = 'badge-terminated';

                return `
                <tr class="${e.status === 'TERMINATED' ? 'terminated' : ''}">
                    <td><strong>#${e.id}</strong></td>
                    <td>${e.fullName}</td>
                    <td>${e.phone || '-'}</td>
                    <td>${e.branchName || '-'}</td>
                    <td>
                        <span class="badge ${badgeClass}">${e.status || 'UNKNOWN'}</span>
                    </td>
                </tr>
            `}).join("");
    }

    function renderDropdowns() {
        const options = employees.map(e =>
            `<option value="${e.id}">
                ${e.id} - ${e.fullName} ${e.status === 'TERMINATED' ? '(Terminated)' : ''}
            </option>`
        ).join("");

        document.getElementById("updateId").innerHTML = options;
        document.getElementById("deleteId").innerHTML = options;
    }

    async function updateEmployee() {
        const id = document.getElementById("updateId").value;
        const body = {
            fullName: document.getElementById("fullName").value,
            phone: document.getElementById("phone").value,
            dateOfBirth: document.getElementById("dob").value,
            baseSalary: Number(document.getElementById("salary").value || 0),
            employmentType: document.getElementById("employmentType").value,
            status: document.getElementById("status").value,
            branchId: Number(document.getElementById("branchId").value || 0)
        };

        try {
            await fetch(`/api/hr/employees/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify(body)
            });
            alert("Cập nhật thành công!");
            load();
        } catch(e) {
            alert("Có lỗi xảy ra khi cập nhật!");
        }
    }

    async function deleteEmployee() {
        if(!confirm("Bạn có chắc chắn muốn xóa/ngưng việc nhân sự này?")) return;

        const id = document.getElementById("deleteId").value;
        try {
            await fetch(`/api/hr/employees/${id}`, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });
            load();
        } catch(e) {
            alert("Có lỗi xảy ra!");
        }
    }

    async function reactivateEmployee() {
        const id = document.getElementById("deleteId").value;
        try {
            await fetch(`/api/hr/employees/${id}/reactivate`, {
                method: "PUT",
                headers: { "Authorization": "Bearer " + token }
            });
            load();
        } catch(e) {
            alert("Có lỗi xảy ra!");
        }
    }

    load();
</script>

</body>
</html>
