<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Kho Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Quản lý tồn kho</h3>
            <a th:if="${userRole == 'ROLE_ADMIN' or userRole == 'ROLE_MANAGER'}"
               href="/inventory/report" class="btn btn-warning btn-sm">Xem Báo cáo Doanh thu</a>
        </div>

        <div class="card-body">
            <div th:if="${lowStockCount != null and lowStockCount > 0}" class="alert alert-danger" role="alert">
                <strong>Cảnh báo!</strong> Hiện có <span th:text="${lowStockCount}">0</span> sản phẩm sắp hết hàng (tồn kho dưới 100).
            </div>

            <div class="d-flex justify-content-between mb-4">
                <form th:action="@{/inventory/dashboard}" method="get" class="flex-grow-1 me-2">
                    <div class="input-group">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Nhập tên sản phẩm cần tìm...">
                        <button class="btn btn-primary" type="submit">Tìm kiếm</button>
                        <a href="/inventory/dashboard" class="btn btn-secondary">Reset</a>
                    </div>
                </form>
                <a th:href="@{/inventory/export/excel}" class="btn btn-success">Xuất Excel</a>
            </div>

            <div th:if="${userRole == 'ROLE_ADMIN' or userRole == 'ROLE_MANAGER'}"
                 class="card p-3 mb-4 border-primary">
                <h5 class="text-primary">Thêm sản phẩm mới</h5>
                <form th:action="@{/inventory/add}" th:object="${newItem}" method="post" class="row g-3">
                    <div class="col-md-4">
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Tên sản phẩm" required>
                    </div>
                    <div class="col-md-3">
                        <input type="number" th:field="*{currentStock}" class="form-control" placeholder="Số lượng" step="0.01" required>
                    </div>
                    <div class="col-md-3">
                        <input type="text" th:field="*{unit}" class="form-control" placeholder="Đơn vị (vd: Cây)" required>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Lưu</button>
                    </div>
                </form>
            </div>

            <table class="table table-hover table-striped">
                <thead class="table-dark">
                <tr>
                    <th>Tên sản phẩm</th>
                    <th>Tồn kho</th>
                    <th>Đơn vị</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}"
                    th:classappend="${item.currentStock != null and item.currentStock < 100} ? 'table-danger' : ''">
                    <td th:text="${item.name}">Tên sản phẩm</td>
                    <td th:text="${#numbers.formatDecimal(item.currentStock, 1, 2)}">0.00</td>
                    <td th:text="${item.unit}">Cái</td>
                    <td>
                        <a th:if="${userRole == 'ROLE_ADMIN'}"
                           th:href="@{/inventory/delete/{id}(id=${item.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Bạn chắc chắn muốn xóa sản phẩm này?')">Xóa</a>
                        <span th:if="${userRole != 'ROLE_ADMIN'}" class="text-muted small">Không có quyền</span>
                    </td>
                </tr>
                <tr th:if="${items == null or #lists.isEmpty(items)}">
                    <td colspan="4" class="text-center text-muted">Không tìm thấy sản phẩm nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
