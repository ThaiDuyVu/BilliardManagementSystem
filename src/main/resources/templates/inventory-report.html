<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Báo cáo Doanh thu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light p-4">
<div class="container">
    <h2>Báo cáo doanh thu</h2>
    <a href="/inventory/dashboard" class="btn btn-secondary mb-3">Quay lại Dashboard</a>

    <div class="card mb-4 p-3">
        <canvas id="revenueChart" height="100"></canvas>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>Ngày</th>
            <th>Doanh thu (VNĐ)</th>
            <th>Trạng thái</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${reports}">
            <td th:text="${r.reportDate}"></td>
            <td th:text="${#numbers.formatDecimal(r.grossRevenue, 0, 'COMMA', 0, 'POINT')}"></td>
            <td th:text="${r.status}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(reports)}">
            <td colspan="3" class="text-center">Chưa có dữ liệu báo cáo</td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    // Gọi API để lấy dữ liệu vẽ biểu đồ
    fetch('/inventory/api/revenue-stats')
        .then(response => response.json())
        .then(data => {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(r => r.reportDate),
                    datasets: [{
                        label: 'Doanh thu (VNĐ)',
                        data: data.map(r => r.grossRevenue),
                        backgroundColor: 'rgba(54, 162, 235, 0.6)'
                    }]
                },
                options: { scales: { y: { beginAtZero: true } } }
            });
        });
</script>
</body>
</html>
